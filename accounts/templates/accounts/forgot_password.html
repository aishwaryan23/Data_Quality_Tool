{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | QualiX - HDFC Bank</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .login-card {
            border-radius: 30px !important;
            padding: 40px !important;
            box-shadow: 0 15px 35px rgba(0, 76, 143, 0.1) !important;
            max-width: 420px !important;
            width: 100% !important;
            border: none !important;
            background: #ffffff !important;
        }
        .login-logo img {
            width: 200px !important;
            height: auto !important;
            margin-bottom: 20px !important;
            display: block !important;
            margin-left: auto !important;
            margin-right: auto !important;
        }
        .login-brand-title {
            color: #004c8f !important;
            font-size: 2.8rem !important;
            font-weight: 800 !important;
            margin: 0 !important;
            letter-spacing: -0.5px !important;
            text-align: center !important;
        }
        .login-brand-subtitle {
            color: #718096 !important;
            font-size: 0.95rem !important;
            font-weight: 500 !important;
            margin-top: 5px !important;
            margin-bottom: 25px !important;
            text-align: center !important;
        }
        .btn-reset-red {
            background: #ed232a !important;
            color: #ffffff !important;
            font-weight: 700 !important;
            font-size: 1.1rem !important;
            padding: 14px 24px !important;
            border-radius: 12px !important;
            border: none !important;
            width: 100% !important;
            cursor: pointer !important;
            transition: all 0.3s ease !important;
            margin-top: 10px !important;
            box-shadow: 0 4px 12px rgba(237, 35, 42, 0.2) !important;
        }
        .btn-reset-red:hover {
            background: #d11b22 !important;
            transform: translateY(-2px) !important;
            box-shadow: 0 6px 16px rgba(237, 35, 42, 0.3) !important;
        }
        .back-to-login {
            text-align: center !important;
            display: block !important;
            margin-top: 20px !important;
            color: #004c8f !important;
            font-weight: 600 !important;
            text-decoration: none !important;
        }
        .back-to-login:hover {
            color: #ed232a !important;
            text-decoration: underline !important;
        }
    </style>
</head>
<body>
    <div class="login-bg-watermark"></div>

    <div class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-logo">
                    <img src="{% static 'images/hdfc_logo.png' %}" alt="HDFC Bank">
                    <h1 class="login-brand-title">Reset Password</h1>
                    <p class="login-brand-subtitle">Enter admin credentials to authorize user password reset</p>
                </div>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="post" action="{% url 'accounts:forgot_password' %}">
                    {% csrf_token %}
                    
                    <div style="background: rgba(0, 76, 143, 0.04); padding: 16px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(0, 76, 143, 0.1);">
                        <h4 style="color: #004c8f; margin: 0 0 12px 0; font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px;">Admin Authorization</h4>
                        
                        <div class="form-group" style="margin-bottom: 12px;">
                            <label for="admin_username" style="font-weight: 600; color: #004c8f; display: block; margin-bottom: 6px; font-size: 0.85rem;">Admin Username</label>
                            <input type="text" name="admin_username" id="admin_username" class="form-control" 
                                   placeholder="Enter admin username" required>
                        </div>
                        
                        <div class="form-group" style="margin-bottom: 0;">
                            <label for="admin_password" style="font-weight: 600; color: #004c8f; display: block; margin-bottom: 6px; font-size: 0.85rem;">Admin Password</label>
                            <input type="password" name="admin_password" id="admin_password" class="form-control" 
                                   placeholder="Enter admin password" required style="-webkit-text-security: disc;">
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 16px;">
                        <label for="target_username" style="font-weight: 700; color: #004c8f; display: block; margin-bottom: 8px;">User to Reset</label>
                        <select name="target_username" id="target-username" class="form-control" required style="width: 100%; height: 42px; border-radius: 8px; border: 1px solid var(--border-medium); padding: 0 12px; font-family: inherit; background: var(--bg-input);">
                            <option value="">-- Select User --</option>
                            {% for u in users %}
                                <option value="{{ u.username }}">{{ u.username }} ({{ u.profile.get_role_display|default:"User" }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="new_password" style="font-weight: 700; color: #004c8f; display: block; margin-bottom: 8px;">New Password</label>
                        <input type="password" name="new_password" id="new_password" class="form-control" 
                               placeholder="Enter new password" required>
                    </div>

                    <button type="submit" class="btn-reset-red">
                        <i class="fas fa-key" style="margin-right: 8px;"></i>
                        Reset Password
                    </button>
                </form>

                <div style="text-align: center; margin-top: 20px;">
                    <a href="{% url 'accounts:login' %}" class="back-to-login">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
