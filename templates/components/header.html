<!-- Top Header Bar -->
<header class="top-header">
    <div class="header-left">
        <button class="sidebar-toggle" id="sidebar-toggle">
            <i class="fas fa-bars"></i>
        </button>
        <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
    </div>
    <div class="header-right">
        <button class="header-btn" data-tooltip="Refresh" onclick="location.reload()">
            <i class="fas fa-sync-alt"></i>
        </button>
        <div class="notifications-dropdown-wrapper" style="position: relative;">
            <button class="header-btn" id="notifications-btn" data-tooltip="Notifications">
                <i class="fas fa-bell"></i>
                <span class="notification-dot" id="notifications-badge" style="display: none;"></span>
            </button>
            <div class="notifications-dropdown" id="notifications-dropdown" style="display: none; position: absolute; right: 0; top: 100%; margin-top: 8px; width: 320px; background: var(--bg-card); border: 1px solid var(--border-medium); border-radius: var(--radius-md); box-shadow: var(--shadow-lg); z-index: 1000; overflow: hidden;">
                <div class="notifications-header" style="display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border-light); background: var(--primary-light);">
                    <h4 style="margin: 0; font-size: 0.9rem; font-weight: 600; color: var(--primary);">Notifications</h4>
                    <button id="clear-notifications-btn" style="background: none; border: none; font-size: 0.75rem; color: var(--text-muted); cursor: pointer; text-decoration: underline;">Clear all</button>
                </div>
                <div class="notifications-list" id="notifications-list" style="max-height: 280px; overflow-y: auto;">
                    <div style="padding: 16px; text-align: center; color: var(--text-muted); font-size: 0.85rem;">
                        No new notifications
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
